spring.application.name=costumi-backend

# --- Persistencia ---
# El esquema lo maneja Flyway (code-first + migraciones). NUNCA ddl-auto=update.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# --- API ---
# Errores en formato Problem Details (RFC 7807), spec §5.6.
spring.mvc.problemdetails.enabled=true

# --- Reglas de negocio (configurables) ---
# Plazo (días) para que el SuperAdmin resuelva una solicitud de empresa (RF-15.4).
costumi.empresa.plazo-resolucion-dias=2

# --- Operabilidad ---
management.endpoints.web.exposure.include=health,info
