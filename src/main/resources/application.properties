spring.application.name=costumi-backend

# --- Persistencia ---
# El esquema lo maneja Flyway (code-first + migraciones). NUNCA ddl-auto=update.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# --- API ---
# Errores en formato Problem Details (RFC 7807), spec §5.6.
spring.mvc.problemdetails.enabled=true

# --- Reglas de negocio (configurables) ---
# Plazo (días) para que el SuperAdmin resuelva una solicitud de empresa (RF-15.4).
costumi.empresa.plazo-resolucion-dias=2

# --- Seguridad: auth por token JWT (RF-17.4 / §5.6) ---
# HS256: el secreto debe tener >= 32 bytes. En producción, override con COSTUMI_JWT_SECRET.
costumi.security.jwt.secret=${COSTUMI_JWT_SECRET:dev-secret-cambiar-en-produccion-min-32-bytes-0123456789}
costumi.security.jwt.expiracion-minutos=60
# Emisor del token; el decoder valida que coincida (evita aceptar tokens de otro emisor).
costumi.security.jwt.issuer=costumi

# Bootstrap del SuperAdmin al inicio (vacío = no crea nada). En despliegue, setear por entorno.
costumi.security.bootstrap.superadmin.email=${COSTUMI_SUPERADMIN_EMAIL:}
costumi.security.bootstrap.superadmin.password=${COSTUMI_SUPERADMIN_PASSWORD:}

# --- Operabilidad ---
management.endpoints.web.exposure.include=health,info
