spring.application.name=costumi-backend

# --- Persistencia ---
# El esquema lo maneja Flyway (code-first + migraciones). NUNCA ddl-auto=update.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# --- API ---
# Errores en formato Problem Details (RFC 7807), spec §5.6.
spring.mvc.problemdetails.enabled=true

# --- Reglas de negocio (configurables) ---
# Plazo (días) para que el SuperAdmin resuelva una solicitud de empresa (RF-15.4).
costumi.empresa.plazo-resolucion-dias=2

# --- Seguridad: auth por token JWT (RF-17.4 / §5.6) ---
# HS256: el secreto debe tener >= 32 bytes. En producción, override con COSTUMI_JWT_SECRET.
costumi.security.jwt.secret=${COSTUMI_JWT_SECRET:dev-secret-cambiar-en-produccion-min-32-bytes-0123456789}
costumi.security.jwt.expiracion-minutos=60
# Emisor del token; el decoder valida que coincida (evita aceptar tokens de otro emisor).
costumi.security.jwt.issuer=costumi

# Bootstrap del SuperAdmin al inicio (vacío = no crea nada). En despliegue, setear por entorno.
costumi.security.bootstrap.superadmin.email=${COSTUMI_SUPERADMIN_EMAIL:}
costumi.security.bootstrap.superadmin.password=${COSTUMI_SUPERADMIN_PASSWORD:}

# Bootstrap de datos de demo: empresa ACTIVA + su dueño (usuario que opera toda la empresa).
# Vacío = no crea nada. En despliegue, setear por entorno para tener con qué probar las apps.
costumi.demo.dueno.email=${COSTUMI_DEMO_DUENO_EMAIL:}
costumi.demo.dueno.password=${COSTUMI_DEMO_DUENO_PASSWORD:}
costumi.demo.empresa.nombre=${COSTUMI_DEMO_EMPRESA:Costumi Demo}
# Cuenta de cliente para la app del cliente (rol MOSTRADOR en la misma empresa demo). Opcional.
costumi.demo.cliente.email=${COSTUMI_DEMO_CLIENTE_EMAIL:}
costumi.demo.cliente.password=${COSTUMI_DEMO_CLIENTE_PASSWORD:}

# --- Email (recuperación de contraseña, RF-1.1) ---
# Envío real OPCIONAL: sin host SMTP, el adaptador solo registra el correo en el log (no rompe nada).
# Ver docs/INFRA_PENDIENTE.md. TODO(credenciales): setear estas variables en el despliegue.
costumi.email.smtp.host=${COSTUMI_SMTP_HOST:}
costumi.email.smtp.port=${COSTUMI_SMTP_PORT:587}
costumi.email.smtp.usuario=${COSTUMI_SMTP_USER:}
costumi.email.smtp.password=${COSTUMI_SMTP_PASS:}
costumi.email.remitente=${COSTUMI_EMAIL_FROM:no-reply@costumi.co}
# Base del enlace de recuperación que se incluye en el correo (opcional; vacío = solo el código).
costumi.email.recuperacion.url-base=${COSTUMI_RESET_URL_BASE:}
costumi.email.recuperacion.duracion-minutos=60

# --- Operabilidad ---
management.endpoints.web.exposure.include=health,info
