# Dependency Review (C5): en cada PR a main, falla si se introduce una dependencia con una
# vulnerabilidad conocida (GitHub Advisory DB). Rápido, sin descargar la NVD ni claves.
# Requiere el Dependency Graph del repo (activo por defecto en repos públicos).
name: Dependency Review

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          # Bloquea el PR si aparece una dependencia con severidad alta o crítica.
          fail-on-severity: high
          # Deja un comentario-resumen en el PR.
          comment-summary-in-pr: on-failure
